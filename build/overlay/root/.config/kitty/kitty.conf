# LuminaOS — kitty terminal config
# Modern, transparent, rounded. Win11 dark theme.

font_family      Noto Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Translucency + blur
background_opacity 0.92
background_blur 8

# Window
remember_window_size  no
initial_window_width  900
initial_window_height 600
window_padding_width  8 12
hide_window_decorations titlebar-only
window_border_width 0
draw_minimal_borders yes
active_border_color #0078D4
inactive_border_color #2C2C2C

# Cursor
cursor_shape beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 10.0

# Scrollback
scrollback_lines 10000
wheel_scroll_multiplier 5.0

# Tab bar
tab_bar_min_tabs 2
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template {title}

# Colors — Fluent dark palette
foreground              #eaeaea
background              #14141c
selection_foreground    #ffffff
selection_background    #0078D4

# Black
color0  #2C2C2C
color8  #4A4A4A
# Red
color1  #FF6B6B
color9  #FF9F9F
# Green
color2  #B6F0A3
color10 #C7F5BC
# Yellow
color3  #FFD166
color11 #FFE49F
# Blue
color4  #00BCF2
color12 #6DD6FF
# Magenta
color5  #C77DFF
color13 #E0AAFF
# Cyan
color6  #6DD6FF
color14 #9FECFF
# White
color7  #D8D8D8
color15 #FFFFFF

# Shell integration
shell_integration enabled
allow_remote_control yes
listen_on unix:/tmp/kitty-socket

# Misc
copy_on_select yes
strip_trailing_spaces smart
enable_audio_bell no
visual_bell_duration 0.0
notify_on_cmd_finish invisible
