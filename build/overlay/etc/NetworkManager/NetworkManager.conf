# LuminaOS — NetworkManager config for desktop use

[main]
plugins=ifupdown,keyfile
dns=systemd-resolved
rc-manager=resolvconf
dhcp=internal

[keyfile]
unmanaged-devices=*,except:type:wifi,except:type:ethernet,except:type:wwan

[connection]
ipv4.dhcp-send-hostname=true
ipv6.method=auto
connection.auth-retries=3
