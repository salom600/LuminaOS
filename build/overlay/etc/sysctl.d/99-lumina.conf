# LuminaOS kernel sysctl defaults — tuned for desktop responsiveness on low-RAM machines.

# Don't swap until we really have to
vm.swappiness = 10
vm.vfs_cache_pressure = 50
vm.dirty_background_ratio = 5
vm.dirty_ratio = 15

# Quiet kernel log (errors only on console)
kernel.printk = 3 3 3 3
kernel.kptr_restrict = 1
kernel.dmesg_restrict = 1

# Faster TCP for desktop workloads
net.core.default_qdisc = fq_codel
net.ipv4.tcp_congestion_control = bbr
net.ipv4.tcp_fastopen = 3

# Enable IPv6 privacy extensions
net.ipv6.conf.all.use_tempaddr = 2
net.ipv6.conf.default.use_tempaddr = 2

# inotify: Wayland & Electron apps need lots of watchers
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 1024
