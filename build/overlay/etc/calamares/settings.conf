# LuminaOS — Calamares settings
# Minimal config that drives the Calamares installer with LuminaOS branding.

modules-search: [ local, "/usr/lib/calamares/modules" ]

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - sources-media
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - users
      - displaymanager
      - networkcfg
      - hwclock
      - services-systemd
      - shellprocess@lumina-postinstall
      - initramfs
      - grubcfg
      - bootloader
      - packages
      - luksbootkeyfile
      - plymouthcfg
      - finalize:
          - preservefiles
          - services-openrc
  - show:
      - finished

# Show / don't show the debug log
show-debug: false

# Branding
branding: lumina

# Optional modules to load after sequence
show-log: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
