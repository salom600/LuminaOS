# LuminaOS — Ly display manager config (TTY login → Hyprland auto-start)
# Auto-login the live user during the live session.

[Service]
# No automatic login on installed systems (after install).
# On live ISO, this is overridden by /etc/ly/config.ini

[Settings]
# TTY to use
tty = 2

# Console color
# 0 = black, 7 = white
term_reset_cleanup = true

# Hide the cursor when typing passwords
hide_borders = false
hide_f1_commands = false
hide_key_hints = true

# Auto-login (live session)
# Comment out after install.
#autologin = lumina

# Session to start
# Available sessions: Hyprland, sway, bash, sh
default_session = Hyprland

# Brightness / contrast / color
load = true
save = true

# Animation
animation = "doom"

# Banner shown above the login
# Comment out for production
#banner = "LuminaOS Live"
#banner_color = 36

# Clock
clock = "%H:%M:%S"

# Number of TTYs to render
num_tty = 2
