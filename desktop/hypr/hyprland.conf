# =============================================================================
#  LuminaOS — Hyprland configuration
#  Modern, Windows 11-inspired: rounded corners, blur, centered taskbar,
#  familiar keyboard shortcuts for Windows refugees.
# =============================================================================

# --- monitor -----------------------------------------------------------------
monitor=,preferred,auto,1

# --- autostart ---------------------------------------------------------------
# Bar, wallpaper, notifications, portal, polkit, audio
exec-once = waybar
exec-once = hyprpaper
exec-once = dunst
exec-once = /usr/libexec/xdg-desktop-portal-hyprland
exec-once = /usr/libexec/xdg-desktop-portal-gtk
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = pipewire
exec-once = pipewire-pulse
exec-once = wireplumber
exec-once = nm-applet --indicator
exec-once = /usr/share/lumina/bin/lumina-welcome

# --- env ---------------------------------------------------------------------
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = CLUTTER_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
env = _JAVA_AWT_WM_NONREPARENTING,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# --- input -------------------------------------------------------------------
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
        clickfinger_behavior = yes
        tap-to-click = yes
        disable_while_typing = true
    }
    sensitivity = 0
}

# --- gestures ----------------------------------------------------------------
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 200
}

# --- look & feel =============================================================
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgb(0078D4) rgb(00BCF2) 90deg
    col.inactive_border = rgb(2C2C2C)
    layout = dwindle
    no_focus_fallback = true
}

decoration {
    rounding = 12
    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = true
    }
    drop_shadow = true
    shadow_range = 12
    shadow_render_power = 2
    shadow_scale = 1.0
    col.shadow = rgba(00000055)
    col.shadow_inactive = rgba(00000000)
    dim_inactive = false
    dim_strength = 0.05
    blur_special = true
}

animations {
    enabled = true
    bezier = easeOutQuint,0.22,1,0.36,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = windowIn,0.16,1,0.3,1
    bezier = windowOut,0.7,0,0.84,0
    animation = windows,1,4,windowIn,popin 80%
    animation = windowsOut,1,4,windowOut,popin 80%
    animation = windowsMove,1,3,easeInOutCubic
    animation = border,1,6,default
    animation = fade,1,4,default
    animation = workspaces,1,5,easeOutQuint,slide
    animation = layers,1,4,easeOutQuint,slide
    animation = layersIn,1,4,windowIn,slide
    animation = layersOut,1,4,windowOut,slide
}

dwindle {
    pseudotile = true
    preserve_split = true
    no_gaps_when_only = false
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
    new_on_top = false
}

# --- misc ====================================================================
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = true
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    layers_hog_keyboard_focus = true
    focus_on_activate = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    enable_swallow = true
    swallow_regex = ^(kitty)$
}

# --- window rules ============================================================
windowrulev2 = float, class:^(firefox)$, title:^(Save File|Open File|Library)
windowrulev2 = float, class:^(thunar)$, title:^(File Operation Progress)
windowrulev2 = float, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = float, class:^(org.gnome.Calculator)$
windowrulev2 = float, class:^(.blueman-manager-wrapped)$
windowrulev2 = float, class:^(lumina-store)$
windowrulev2 = float, class:^(lumina-installer)$
windowrulev2 = float, class:^(calamares)$
windowrulev2 = center, class:^(lumina-store)$
windowrulev2 = center, class:^(lumina-installer)$
windowrulev2 = center, class:^(calamares)$
windowrulev2 = size 70% 80%, class:^(lumina-store)$
windowrulev2 = size 80% 85%, class:^(calamares)$
windowrulev2 = opacity 0.95 0.85, class:^(kitty)$
windowrulev2 = opacity 0.95 0.85, class:^(thunar)$
windowrulev2 = opacity 0.90 0.80, class:^(firefox)$
windowrulev2 = opacity 0.95 0.85, class:^(code)$

# Steam games should be opaque + fullscreen
windowrulev2 = opacity 1.0, class:^(steam_app_)

# --- key bindings ============================================================
# Super = Windows key. Layout matches Windows conventions where possible.

$mainMod = SUPER

# Essential apps
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod SHIFT, RETURN, exec, wofi --show drun
bind = $mainMod, B,      exec, firefox
bind = $mainMod, E,      exec, thunar
bind = $mainMod, S,      exec, /usr/share/lumina/bin/lumina-store
bind = $mainMod, L,      exec, swaylock
bind = $mainMod SHIFT, L, exec, systemctl poweroff 2>/dev/null || loginctl poweroff
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod SHIFT, E, exit
bind = $mainMod, D,      togglesplit
bind = $mainMod, F,      fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod, SPACE,  togglefloating
bind = $mainMod, P,      pseudo, # dwindle
bind = $mainMod, T,      togglegroup
bind = $mainMod, TAB,    changegroupactive, f
bind = $mainMod SHIFT, TAB, changegroupactive, b

# Window focus (Vim-style + arrow fallback)
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r
bind = $mainMod, left,  movefocus, l
bind = $mainMod, down,  movefocus, d
bind = $mainMod, up,    movefocus, u
bind = $mainMod, right, movefocus, r

# Move windows
bind = $mainMod SHIFT, H,     movewindow, l
bind = $mainMod SHIFT, J,     movewindow, d
bind = $mainMod SHIFT, K,     movewindow, u
bind = $mainMod SHIFT, L,     movewindow, r

# Resize
binde = $mainMod CTRL, H, resizeactive, -20 0
binde = $mainMod CTRL, J, resizeactive, 0 20
binde = $mainMod CTRL, K, resizeactive, 0 -20
binde = $mainMod CTRL, L, resizeactive, 20 0

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move/resize windows with mainMod + mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Special keys
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = , XF86AudioPlay,  exec, playerctl play-pause
bind = , XF86AudioNext,  exec, playerctl next
bind = , XF86AudioPrev,  exec, playerctl previous
bind = , XF86AudioStop,  exec, playerctl stop

# Screenshot
bind = ,       Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT,  Print, exec, grim - | wl-copy
bind = CTRL,   Print, exec, grim -g "$(slurp)" ~/Pictures/$(date +%Y%m%d_%H%M%S).png

# Task manager (Ctrl+Shift+Esc, just like Windows)
bind = CTRL SHIFT, Escape, exec, kitty --hold btop

# Run dialog (like Alt+F2 / Win+R)
bind = ALT, F2, exec, wofi --show run
bind = $mainMod, R, exec, wofi --show drun

# Notifications
bind = $mainMod, N, exec, dunstctl history-pop

# --- source split config -----------------------------------------------------
source = ~/.config/hypr/monitors.conf  # optional, user can override
